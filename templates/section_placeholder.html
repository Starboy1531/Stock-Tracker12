<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — Stock Tracker</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", system-ui, sans-serif;
            background: #1a1a2e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            text-align: center;
        }
        a.back {
            display: inline-block;
            margin-top: 1.5rem;
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 600;
        }
        a.back:hover { text-decoration: underline; }
        h1 { margin: 0 0 0.5rem; font-size: 1.35rem; }
        p { margin: 0; color: #a8a8c0; font-size: 0.9375rem; max-width: 280px; }
    </style>
</head>
<body>
    <h1>{{ title }}</h1>
    <p>{{ subtitle }}</p>
    <a class="back" href="{{ back_url }}">← Back to dashboard</a>
</body>
</html>
