<!DOCTYPE html>
<html>
<head>
    <title>Live Charts</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: white; font-family: sans-serif; }

        .header {
            display: flex;
            align-items: center;
            padding: 16px;
            background: #1a1a2e;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header a { color: white; text-decoration: none; font-size: 20px; margin-right: 16px; }
        .header h1 { font-size: 18px; font-weight: 500; }

        .search-section {
            padding: 12px 16px;
            background: #1a1a2e;
        }
        .search-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .search-input {
            flex: 1;
            background: #2a2a4a;
            border: 1px solid #444466;
            border-radius: 8px;
            padding: 10px 14px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .search-input::placeholder { color: #888; }
        .search-btn {
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            cursor: pointer;
            font-size: 14px;
        }

        .quick-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 6px;
        }
        .section-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .qbtn {
            background: #2a2a4a;
            color: #ccc;
            border: 1px solid #444466;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .qbtn:hover { background: #4a90e2; color: white; border-color: #4a90e2; }
        .qbtn.active { background: #4a90e2; color: white; border-color: #4a90e2; }

        .chart-container {
            width: 100%;
            height: calc(100vh - 280px);
            min-height: 400px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #16213e;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #2a2a4a;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #888;
            font-size: 11px;
            gap: 4px;
        }
        .nav-item.active { color: #4a90e2; }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>

<div class="header">
    <a href="/dashboard">&#8592;</a>
    <h1>Live charts</h1>
</div>

<div class="search-section">
    <div class="search-row">
        <input type="text" class="search-input" id="symbolInput" placeholder="Search e.g. TCS, RELIANCE, BTCUSDT" value="NSE:TCS">
        <button class="search-btn" onclick="loadChart()">Go</button>
    </div>

    <div class="section-label">Indices</div>
    <div class="quick-btns">
        <button class="qbtn" onclick="setSymbol('NSE:NIFTY50')">NIFTY 50</button>
        <button class="qbtn" onclick="setSymbol('BSE:SENSEX')">SENSEX</button>
        <button class="qbtn" onclick="setSymbol('NSE:BANKNIFTY')">BANKNIFTY</button>
    </div>

    <div class="section-label">Indian stocks</div>
    <div class="quick-btns">
        <button class="qbtn active" onclick="setSymbol('NSE:TCS')">TCS</button>
        <button class="qbtn" onclick="setSymbol('NSE:RELIANCE')">RELIANCE</button>
        <button class="qbtn" onclick="setSymbol('NSE:INFY')">INFY</button>
        <button class="qbtn" onclick="setSymbol('NSE:HDFCBANK')">HDFC BANK</button>
        <button class="qbtn" onclick="setSymbol('NSE:WIPRO')">WIPRO</button>
        <button class="qbtn" onclick="setSymbol('NSE:TATAMOTORS')">TATA MOTORS</button>
    </div>

    <div class="section-label">Crypto</div>
    <div class="quick-btns">
        <button class="qbtn" onclick="setSymbol('BINANCE:BTCUSDT')">BTC</button>
        <button class="qbtn" onclick="setSymbol('BINANCE:ETHUSDT')">ETH</button>
        <button class="qbtn" onclick="setSymbol('BINANCE:SOLUSDT')">SOL</button>
        <button class="qbtn" onclick="setSymbol('BINANCE:XRPUSDT')">XRP</button>
    </div>

    <div class="section-label">US stocks</div>
    <div class="quick-btns">
        <button class="qbtn" onclick="setSymbol('NASDAQ:AAPL')">AAPL</button>
        <button class="qbtn" onclick="setSymbol('NASDAQ:GOOGL')">GOOGL</button>
        <button class="qbtn" onclick="setSymbol('NASDAQ:TSLA')">TSLA</button>
        <button class="qbtn" onclick="setSymbol('NASDAQ:MSFT')">MSFT</button>
    </div>

    <div class="section-label">Forex</div>
    <div class="quick-btns">
        <button class="qbtn" onclick="setSymbol('FX:EURUSD')">EUR/USD</button>
        <button class="qbtn" onclick="setSymbol('FX:GBPUSD')">GBP/USD</button>
        <button class="qbtn" onclick="setSymbol('FX:USDJPY')">USD/JPY</button>
        <button class="qbtn" onclick="setSymbol('FX:USDINR')">USD/INR</button>
    </div>

    <div class="section-label">Commodities</div>
    <div class="quick-btns">
        <button class="qbtn" onclick="setSymbol('COMEX:GC1!')">GOLD</button>
        <button class="qbtn" onclick="setSymbol('COMEX:SI1!')">SILVER</button>
        <button class="qbtn" onclick="setSymbol('NYMEX:CL1!')">CRUDE OIL</button>
    </div>
</div>

<div class="chart-container" id="chartContainer"></div>

<div style="height:60px"></div>

<div class="bottom-nav">
    <a href="/dashboard" class="nav-item">
        <span class="nav-icon">&#8962;</span>
        <span>HOME</span>
    </a>
    <a href="/portfolio" class="nav-item">
        <span class="nav-icon">&#9747;</span>
        <span>PORTFOLIO</span>
    </a>
    <a href="/charts" class="nav-item active">
        <span class="nav-icon">&#8599;</span>
        <span>CHARTS</span>
    </a>
    <a href="/profile" class="nav-item">
        <span class="nav-icon">&#128100;</span>
        <span>PROFILE</span>
    </a>
</div>

<script>
let currentSymbol = 'NSE:TCS';
let tvWidget = null;

function loadChart() {
    const input = document.getElementById('symbolInput').value.trim().toUpperCase();
    if (input) currentSymbol = formatSymbol(input);
    
    document.getElementById('chartContainer').innerHTML = '';
    
    tvWidget = new TradingView.widget({
        autosize: true,
        symbol: currentSymbol,
        interval: "D",
        timezone: "Asia/Kolkata",
        theme: "dark",
        style: "1",
        locale: "en",
        toolbar_bg: "#1a1a2e",
        enable_publishing: false,
        hide_side_toolbar: false,
        allow_symbol_change: true,
        container_id: "chartContainer",
        studies: ["RSI@tv-basicstudies", "MACD@tv-basicstudies"]
    });
}

function setSymbol(symbol) {
    document.querySelectorAll('.qbtn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    currentSymbol = symbol;
    document.getElementById('symbolInput').value = symbol;
    loadChart();
}

function formatSymbol(input) {
    if (input.includes(':')) return input;
    if (input.endsWith('.NS')) return 'NSE:' + input.replace('.NS', '');
    if (input.endsWith('.BO')) return 'BSE:' + input.replace('.BO', '');
    if (input.endsWith('USDT')) return 'BINANCE:' + input;
    if (input.endsWith('-USD')) return 'BINANCE:' + input.replace('-USD', 'USDT');
    return 'NSE:' + input;
}

window.onload = loadChart;
</script>

<script src="https://s3.tradingview.com/tv.js"></script>

</body>
</html>
