<!DOCTYPE html>
<html>
<head>
    <title>Live Charts</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: white; font-family: sans-serif; }

        .header {
            display: flex;
            align-items: center;
            padding: 16px;
            background: #1a1a2e;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header a { color: white; text-decoration: none; font-size: 20px; margin-right: 16px; }
        .header h1 { font-size: 18px; font-weight: 500; }

        .chart-container {
            width: 100%;
            height: calc(100vh - 140px);
            min-height: 400px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #16213e;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #2a2a4a;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #888;
            font-size: 11px;
            gap: 4px;
        }
        .nav-item.active { color: #4a90e2; }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>

<div class="header">
    <a href="/dashboard">&#8592;</a>
    <h1>Live charts</h1>
</div>

<div class="chart-container" id="chartContainer"></div>

<div style="height:60px"></div>

<div class="bottom-nav">
    <a href="/dashboard" class="nav-item">
        <span class="nav-icon">&#8962;</span>
        <span>HOME</span>
    </a>
    <a href="/portfolio" class="nav-item">
        <span class="nav-icon">&#9747;</span>
        <span>PORTFOLIO</span>
    </a>
    <a href="/charts" class="nav-item active">
        <span class="nav-icon">&#8599;</span>
        <span>CHARTS</span>
    </a>
    <a href="/profile" class="nav-item">
        <span class="nav-icon">&#128100;</span>
        <span>PROFILE</span>
    </a>
</div>

<script>
let currentSymbol = 'NASDAQ:AAPL';
let tvWidget = null;

function loadChart() {
    document.getElementById('chartContainer').innerHTML = '';

    tvWidget = new TradingView.widget({
        autosize: true,
        symbol: currentSymbol,
        interval: "D",
        timezone: "Asia/Kolkata",
        theme: "dark",
        style: "1",
        locale: "en",
        toolbar_bg: "#1a1a2e",
        enable_publishing: false,
        hide_side_toolbar: false,
        allow_symbol_change: true,
        container_id: "chartContainer",
        studies: ["Volume@tv-basicstudies"]
    });
}

window.onload = loadChart;
</script>

<script src="https://s3.tradingview.com/tv.js"></script>

</body>
</html>
