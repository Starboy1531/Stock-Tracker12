<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — Stock Tracker</title>
    <style>
        :root {
            --bg: #0c0d10;
            --bg-card: #14151a;
            --border: rgba(255, 255, 255, 0.08);
            --text: #f4f4f5;
            --muted: #a1a1aa;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --input-bg: #1a1b21;
            --danger: #f87171;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", system-ui, -apple-system, Roboto, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b2e 50%, #0d1117 100%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            line-height: 1.5;
        }

        .glow {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59, 130, 246, 0.18), transparent),
                radial-gradient(ellipse 60% 40% at 100% 50%, rgba(139, 92, 246, 0.08), transparent);
        }

        .card {
            position: relative;
            width: 100%;
            max-width: 400px;
            background: #161b2e;
            border: 1px solid #2e3250;
            border-radius: 16px;
            padding: 2rem 2rem 1.75rem;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.45);
        }

        .brand {
            text-align: center;
            margin-bottom: 1.75rem;
        }

        .brand h1 {
            margin: 0 0 0.35rem;
            font-size: 1.35rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .brand p {
            margin: 0;
            font-size: 0.875rem;
            color: var(--muted);
        }

        label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }

        .field {
            margin-bottom: 1rem;
        }

        .field-input {
            background: #1e2130;
            border: 1px solid #2e3250;
            border-radius: 10px;
            color: white;
            padding: 14px;
            font-size: 14px;
            width: 100%;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .field-input::placeholder {
            color: #71717a;
        }

        .field-input:focus {
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.8rem 1rem;
            font-size: 0.9375rem;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s, transform 0.1s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            margin-top: 0.25rem;
        }

        .btn-primary:hover { background: var(--accent-hover); }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.25rem 0;
            color: var(--muted);
            font-size: 0.75rem;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .btn-google {
            background: #fff;
            color: #18181b;
            border: 1px solid var(--border);
            gap: 0.5rem;
        }

        .btn-google:hover { background: #f4f4f5; }

        .btn-google svg { flex-shrink: 0; }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--muted);
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover { text-decoration: underline; }

        .flash {
            list-style: none;
            margin: 0 0 1rem;
            padding: 0;
        }

        .flash li {
            padding: 0.65rem 0.85rem;
            border-radius: 10px;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .flash li.error {
            background: rgba(248, 113, 113, 0.12);
            color: #fca5a5;
            border: 1px solid rgba(248, 113, 113, 0.25);
        }

        .flash li.success {
            background: rgba(34, 197, 94, 0.12);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.25);
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #1e2130 inset !important;
            -webkit-text-fill-color: white !important;
            caret-color: white !important;
        }

        input:focus {
            background: #1e2130 !important;
            border-color: #4a90e2 !important;
            color: white !important;
            outline: none !important;
        }
    </style>
</head>
<body>
    <div class="glow" aria-hidden="true"></div>
    <div class="card">
        <div class="brand">
            <h1>Stock Tracker</h1>
            <p>Sign in to your account</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <ul class="flash">
            {% for category, message in messages %}
            <li class="{{ category }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% endwith %}
        <form action="{{ url_for('login') }}" method="post" autocomplete="on">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="field-input" placeholder="you@example.com" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <div style="position:relative;">
                    <input type="password" id="password" name="password" class="field-input" placeholder="Enter password" required>
                    <span onclick="togglePassword('password', this)" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; color:#888; user-select:none; background:transparent; border:none; padding:0; display:flex; align-items:center;">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </span>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
        <div class="divider">or</div>
        <a href="/login/google" class="btn btn-google" role="button">
            <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
                <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
                <path fill="#FBBC05" d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.712s.102-1.172.282-1.712V4.956H.957C.348 6.175 0 7.55 0 9s.348 2.825.957 4.044l3.007-2.332z"/>
                <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.956L3.964 7.288C4.672 5.163 6.656 3.58 9 3.58z"/>
            </svg>
            Continue with Google
        </a>
        <p class="footer">No account? <a href="{{ url_for('signup') }}">Sign up</a></p>
    </div>
    <script>
        function togglePassword(inputId, span) {
            const input = document.getElementById(inputId);
            const svg = span.querySelector('svg');
            if (input.type === 'password') {
                input.type = 'text';
                svg.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                `;
            } else {
                input.type = 'password';
                svg.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                `;
            }
        }
    </script>
</body>
</html>
